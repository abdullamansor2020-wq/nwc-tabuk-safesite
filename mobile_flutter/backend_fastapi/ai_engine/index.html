<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NWC Tabuk SafeSite</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fa;
    }

    .header {
      background: #0057B8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .logo {
      font-size: 60px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0057B8;
    }

    .kpi {
      font-size: 30px;
      font-weight: bold;
      color: #0057B8;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️</div>
  <h1>NWC Tabuk SafeSite</h1>
  <p>AI Construction Safety Platform</p>
</div>

<div class="container">

  <div class="card">
    <div class="title">Safety Score</div>
    <div class="kpi">92%</div>
  </div>

  <div class="card">
    <div class="title">Open Violations</div>
    <div class="kpi">3</div>
  </div>

  <div class="card">
    <div class="title">Critical Hazards</div>
    <div class="kpi">1</div>
  </div>

  <div class="card">
    <div class="title">Projects</div>
    <div class="kpi">5</div>
  </div>

</div>

</body>
</html>
