name: Deploy NWC Tabuk SafeSite Web

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create simple website
        run: |
          mkdir website
          echo "<h1>NWC Tabuk SafeSite</h1><p>Website deployment is working.</p>" > website/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
